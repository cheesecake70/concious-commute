steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/conscious-commute:$COMMIT_SHA',
      '-f', 'deployment/Dockerfile',
      '.'
    ]

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/conscious-commute:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'conscious-commute',
      '--image', 'gcr.io/$PROJECT_ID/conscious-commute:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'GOOGLE_GENAI_USE_VERTEXAI=FALSE'
    ]

images:
  - 'gcr.io/$PROJECT_ID/conscious-commute:$COMMIT_SHA'
